<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios y tablas</title>
    <meta name="description" content="Prueba para formularios y tablas">
    <meta name="author" content="Mars">
    <meta name="robots" content="index, follow"> <!--noindex y nofollow para que no lean las páginas en desarrollo-->
    <meta http-equiv="Cache-control" content="no-cache, no-store, must-revalidate"> <!--no guarda la página en cache-->
    <meta http-equiv="X-UA-Compatible" content="IE-edge"> <!--compatibilidad de navegador-->
</head>
<body>
    <header style="text-align: center;">
        <h1>Formularios y tablas</h1>
        <img src="https://picsum.photos/250" alt="imagen header" sizes="(max-width: 600px) 100vw, 50vw">
        <nav>
            <ul style="text-decoration: none; padding: 0;">
                <li style="display: inline;"><a href="#" style="text-decoration: none;">Formularios</a></li>
                <li style="display: inline; padding-left: 5vw;"><a href="#" style="text-decoration: none;">Tablas</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <article>
                <h2>Formularios</h2>
                <form action="/registro" method="post">
                    <label for="nombre">Nombre</label>
                    <input type="text" name="nombre" placeholder="Escribe tu nombre">
                    <input type="text" pattern="[A-Za-z0-9?=/%&$\*ñÑçÇ]{8,12}">
                    <!-- <input type="password" name="password"> sirve para esconder el texto al escribirlo -->
                    <!-- <input type="email" name="email"> -->
                    <!-- <input type="submit" name="enviar"> -->
                    <!-- <input type="date" name="fecha"> -->
                    <!-- <input type="radio" name="genero" value="hombre"> Man
                    <input type="radio" name="genero" value="mujer"> Woman
                    <input type="radio" name="genero" value="otro"> Other -->
                    <!-- <input type="checkbox" name="intereses" value="js"> JavaScript
                    <input type="checkbox" name="intereses" value="c"> C -->
                    <button type="submit">Search</button>
                    <button type="reset">Reset</button>
                </form>
            </article>
        </section>
        <section>
            <article>
                <h2>Tablas</h2>
                <table border="1">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Edad</th>
                            <th>Ciudad</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Carlos</td>
                            <td>25</td>
                            <td>Madrid</td>
                        </tr>
                        <tr>
                            <td>Marc</td>
                            <td>33</td>
                            <td>Barcelona</td>
                        </tr>
                    </tbody>
                    <tfooter>
                        <tr>
                            <td colspan="3">Total: 2</td>
                        </tr>
                    </tfooter>
                </table>
            </article>
        </section>
    </main>
    <footer>

    </footer>
</body>
</html>
