<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0 auto;
            padding: 0;
        }

        img{
            width: 3vw;
            height: 25%;
            border-radius: 50%;
        }
        p{
            font-family: 'Google Sans';
            font-weight: 600;
        }
        .icon{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: none;
        }
        .apps{
            width: 5px;
            height: 5px;
            background-color: black;
            border-radius: 50%;
            margin: 1px;
        }
        .header{
            display: flex;
        }
        .header a{
            color: grey;
            text-decoration: none;
        }
        .header a:hover{
            text-decoration: underline 1px solid grey;
        }
        .headerLeft{
            width: 20vw;
            margin-left: 2vw;
            margin-top: 3vh;
        }
        .espaciado{
            padding-left: 1vw;
        }
        .headerRight{
            display: flex;
            width: 20vw;
            height: 100%;
            margin: 2vh 2vw 0 0;
            align-items: center;
        }
        .main{
            padding-top: 15vh;
            text-align: center;
        }
        .main > p{
            font-size: 75px;
            font-weight: 200;
        }
        .red{
            color: red;
        }
        .green{
            color: green;
        }
        .yellow{
            color: yellow;
        }
        .blue{
            color: blue;
        }
        .botones{
            display: flex;
            width: 20vw;
            padding-top: 10px;
        }
        .buttonStyle{
            padding: 5px 10px;
            border-radius: 5px;
            border: none;
        }
        .rotate{
            display: inline-block;
            rotate: -15deg;
        }
        .flexDiv{
            display: flex;
            justify-content: space-between;
            width: 40vw;
            height: 4vh;
            border: 0.5px solid black;
            border-radius: 6px;
        }
        .flexDiv:hover{
            box-shadow: 0px 2px 1px rgba(0, 0, 0, 0.3);
        }
        .search{
            border: none;
        }
        .buscaIcono{
            width: 100%;
            height: 100%;
        }
        .flexIconos{
            display: flex;
        }
        .bold{
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="headerLeft">
            <a href="">Sobre Google</a>
            <a href="" class="espaciado">Tienda</a>
        </div>
        <div class="headerRight">
            <a href="">Gmail</a>
            <a href="">Imágenes</a>
            <div class="icon">
                <div class="apps"></div>
                <div class="apps"></div>
                <div class="apps"></div>
                <div class="apps"></div>
                <div class="apps"></div>
                <div class="apps"></div>
                <div class="apps"></div>
                <div class="apps"></div>
                <div class="apps"></div>
            </div>
            <img src="https://picsum.photos/200" alt="imagen de perfil">
        </div>
    </div>
    <div class="main">
        <p>
            <span class="blue">G</span><span class="red">o</span><span class="yellow">o</span><span class="blue">g</span><span class="green">l</span><span class="red rotate">e</span>
        </p>
        <div class="flexDiv">
            <div class="bold">+</div>
            <div><input type="text" name="buscador" class="search"></div>
            <div class="flexIconos">
                <img src="../iconos/iconos/google-voice.png" alt="#" class="buscaIcono">
                <img src="../iconos/iconos/picture.png" alt="#" class="buscaIcono">
            </div>
        </div>
        <div class="botones">
                <button class="buttonStyle">Buscar con Google</button>
                <button class="buttonStyle">Voy a tener suerte</button>
        </div>
    </div>
</body>
</html>
