<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondrian</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .grid{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 0.5fr 1fr 1fr;
            grid-template-rows: repeat(6, 1fr);
            height: 560px;
            width: 500px;
            border: 8px solid black;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .gridItem1{
            box-sizing: border-box;
            background-color: #E63946;
            border: 8px solid black;
            margin: -8px -4px -4px -8px;
            grid-row: 1 / span 4;
            grid-column: 1 / 5;
        }
        .gridItem2{
            box-sizing: border-box;
            background-color: #F1C40F;
            border: 8px solid black;
            margin: -8px -8px -4px -4px;
            grid-row: 1 / 3;
            grid-column: 5 / 7;
        }
        .gridItem5{
            box-sizing: border-box;
            background-color: #000;
            border: 8px solid black;
            margin: -4px -4px -8px -8px;
            grid-row: 5 / 7 ;
            grid-column: 1 / 3;
        }
        .gridItem9{
            box-sizing: border-box;
            background-color: #1D4ED8;
            border: 8px solid black;
            margin: -4px -8px -8px -4px;
            grid-column: 5 / 7;
        }
        .gridItem3,
        .gridItem4,
        .gridItem6,
        .gridItem7,
        .gridItem8{
            box-sizing: border-box;
            background-color: #F8F9FA;
            border: 8px solid black;
        }
        .gridItem3,
        .gridItem4{
            grid-row: 3 / 5;
            margin: -4px -4px -4px -4px;
        }
        .gridItem4{
            margin-right: -8px;
        }
        .gridItem6,
        .gridItem7{
            grid-column: 3 / 5;
            margin: -4px -4px -4px -4px;    
        }
        .gridItem8{
            grid-row: 5 / 6;
            grid-column: 5 / 7;
            margin: -4px -8px -4px -4px;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="gridItem1"></div>
        <div class="gridItem2"></div>
        <div class="gridItem3"></div>
        <div class="gridItem4"></div>
        <div class="gridItem5"></div>
        <div class="gridItem6"></div>
        <div class="gridItem7"></div>
        <div class="gridItem8"></div>
        <div class="gridItem9"></div>
    </div>
</body>
</html>
